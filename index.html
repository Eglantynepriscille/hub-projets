<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub Projets</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e10; --surface: #17171a; --surface2: #1e1e22; --surface3: #26262b;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
    --text: #f0eff2; --text2: #9997a3; --text3: #5a5865;
    --accent: #7c6af7; --accent2: #a598ff;
    --green: #3ecf8e; --amber: #f5a623; --red: #f26d6d; --teal: #3ecfcf; --pink: #e879a0;
    --radius: 12px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.6; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
  .app { display: flex; min-height: 100vh; }
  .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); padding: 24px 0; flex-shrink: 0; display: flex; flex-direction: column; position: fixed; height: 100vh; overflow-y: auto; }
  .main { margin-left: 220px; padding: 32px; flex: 1; max-width: 1100px; }
  .logo { padding: 0 20px 24px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .logo-text { font-size: 16px; font-weight: 500; color: var(--text); letter-spacing: -.02em; }
  .logo-sub { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: 'DM Mono', monospace; }
  .nav-section { padding: 0 12px; margin-bottom: 20px; }
  .nav-label { font-size: 10px; color: var(--text3); letter-spacing: .08em; text-transform: uppercase; padding: 0 8px; margin-bottom: 6px; }
  .nav-item { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: var(--radius-sm); cursor: pointer; color: var(--text2); font-size: 13px; transition: all .15s; border: none; background: transparent; width: 100%; text-align: left; font-family: 'DM Sans', sans-serif; }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--surface3); color: var(--text); }
  .nav-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .nav-count { margin-left: auto; font-size: 10px; background: var(--surface3); color: var(--text3); padding: 1px 6px; border-radius: 10px; font-family: 'DM Mono', monospace; }
  .sidebar-footer { margin-top: auto; padding: 16px 20px; border-top: 1px solid var(--border); }
  .add-project-btn { width: 100%; padding: 9px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity .15s; }
  .add-project-btn:hover { opacity: .85; }
  .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; }
  .page-title { font-size: 24px; font-weight: 500; letter-spacing: -.03em; }
  .page-date { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 4px; }
  .header-actions { display: flex; gap: 8px; }
  .btn { padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; border: 1px solid var(--border2); background: var(--surface2); color: var(--text2); transition: all .15s; }
  .btn:hover { background: var(--surface3); color: var(--text); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { opacity: .85; background: var(--accent); color: #fff; }
  .metrics-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; margin-bottom: 28px; }
  .metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; }
  .metric-label { font-size: 11px; color: var(--text3); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .06em; }
  .metric-value { font-size: 28px; font-weight: 300; color: var(--text); letter-spacing: -.04em; font-family: 'DM Mono', monospace; }
  .metric-accent { width: 28px; height: 2px; border-radius: 1px; margin-bottom: 10px; }
  .filters { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .filter-label { font-size: 12px; color: var(--text3); margin-right: 4px; }
  .filter-pill { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); font-size: 12px; cursor: pointer; background: transparent; color: var(--text2); transition: all .15s; font-family: 'DM Sans', sans-serif; }
  .filter-pill:hover { border-color: var(--border2); color: var(--text); }
  .filter-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  .project-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; cursor: pointer; transition: all .2s; position: relative; overflow: hidden; animation: fadeIn .25s ease both; }
  .project-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--card-color, var(--accent)); }
  .project-card:hover { border-color: var(--border2); transform: translateY(-1px); }
  .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
  .card-badges { display: flex; gap: 5px; flex-wrap: wrap; }
  .badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; font-family: 'DM Mono', monospace; }
  .b-startup { background: rgba(124,106,247,.15); color: #a598ff; }
  .b-client { background: rgba(62,207,142,.12); color: #3ecf8e; }
  .b-perso { background: rgba(232,121,160,.12); color: #e879a0; }
  .b-event { background: rgba(213,90,48,.15); color: #f5a083; }
  .b-agence { background: rgba(245,166,35,.12); color: #f5a623; }
  .b-autre { background: rgba(90,88,101,.2); color: #9997a3; }
  .s-active { background: rgba(62,207,142,.12); color: #3ecf8e; }
  .s-planning { background: rgba(245,166,35,.12); color: #f5a623; }
  .s-hold { background: rgba(242,109,109,.12); color: #f26d6d; }
  .s-done { background: rgba(62,207,207,.12); color: #3ecfcf; }
  .card-menu { display: flex; gap: 4px; opacity: 0; transition: opacity .15s; }
  .project-card:hover .card-menu { opacity: 1; }
  .icon-btn { width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text3); cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .icon-btn:hover { background: var(--surface3); color: var(--text2); }
  .card-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 6px; letter-spacing: -.02em; }
  .card-desc { font-size: 12px; color: var(--text2); line-height: 1.6; margin-bottom: 14px; }
  .progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .progress-bar { flex: 1; height: 3px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; background: var(--card-color, var(--accent)); transition: width .5s ease; }
  .progress-pct { font-size: 11px; color: var(--text3); min-width: 30px; text-align: right; font-family: 'DM Mono', monospace; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; }
  .card-meta { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .card-tag { font-size: 11px; color: var(--accent2); background: rgba(124,106,247,.1); border: none; border-radius: 6px; padding: 3px 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background .15s; }
  .card-tag:hover { background: rgba(124,106,247,.2); }
  .add-card { border: 1px dashed var(--border); background: transparent; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; min-height: 200px; border-radius: var(--radius); cursor: pointer; color: var(--text3); font-size: 13px; transition: all .15s; }
  .add-card:hover { border-color: var(--border2); color: var(--text2); background: var(--surface); }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); padding: 28px; width: 100%; max-width: 460px; max-height: 85vh; overflow-y: auto; }
  .modal-title { font-size: 17px; font-weight: 500; margin-bottom: 20px; letter-spacing: -.02em; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 11px; color: var(--text3); margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: .06em; }
  .form-input { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; background: var(--surface2); color: var(--text); font-family: 'DM Sans', sans-serif; transition: border-color .15s; }
  .form-input:focus { outline: none; border-color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
  .detail-panel { display: none; position: fixed; right: 0; top: 0; bottom: 0; width: 500px; background: var(--surface); border-left: 1px solid var(--border); z-index: 100; overflow-y: auto; padding: 28px; transform: translateX(100%); transition: transform .25s ease; }
  .detail-panel.open { display: block; transform: translateX(0); }
  .panel-close { position: absolute; top: 20px; right: 20px; width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text3); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
  .panel-close:hover { color: var(--text); }
  .panel-tabs { display: flex; gap: 2px; margin: 20px 0; background: var(--surface2); border-radius: var(--radius-sm); padding: 3px; flex-wrap: wrap; }
  .panel-tab { flex: 1; padding: 6px 8px; border-radius: 6px; font-size: 12px; cursor: pointer; text-align: center; color: var(--text2); transition: all .15s; border: none; background: transparent; font-family: 'DM Sans', sans-serif; min-width: 70px; }
  .panel-tab.active { background: var(--surface3); color: var(--text); }
  .panel-section { display: none; }
  .panel-section.active { display: block; }
  .phase-item { margin-bottom: 14px; }
  .phase-hrow { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .phase-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .phase-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .phase-weeks { font-size: 11px; color: var(--text3); margin-left: auto; font-family: 'DM Mono', monospace; }
  .phase-tasks { padding-left: 22px; }
  .phase-task { font-size: 12px; color: var(--text2); padding: 2px 0; display: flex; gap: 6px; }
  .phase-task::before { content: '—'; color: var(--text3); flex-shrink: 0; }
  .action-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .action-item:last-child { border: none; }
  .prio-tag { font-size: 10px; padding: 2px 7px; border-radius: 8px; font-weight: 500; flex-shrink: 0; margin-top: 1px; font-family: 'DM Mono', monospace; }
  .p-now { background: rgba(242,109,109,.15); color: #f26d6d; }
  .p-week { background: rgba(245,166,35,.15); color: #f5a623; }
  .p-month { background: rgba(62,207,142,.15); color: #3ecf8e; }
  .action-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .action-note { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .kpi-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .kpi-item:last-child { border: none; }
  .kpi-name-t { font-size: 13px; color: var(--text2); }
  .kpi-val { font-size: 13px; font-weight: 500; color: var(--text); font-family: 'DM Mono', monospace; }
  .risk-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .risk-item:last-child { border: none; }
  .risk-hrow { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .rlevel { font-size: 10px; padding: 2px 7px; border-radius: 8px; font-weight: 500; font-family: 'DM Mono', monospace; }
  .r-high { background: rgba(242,109,109,.15); color: #f26d6d; }
  .r-med { background: rgba(245,166,35,.15); color: #f5a623; }
  .r-low { background: rgba(62,207,142,.15); color: #3ecf8e; }
  .risk-title { font-size: 13px; font-weight: 500; color: var(--text); }
  .risk-mit { font-size: 12px; color: var(--text2); }
  .empty-panel { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 13px; line-height: 1.8; }
  .panel-cta { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
  .panel-btn { padding: 8px 14px; border-radius: var(--radius-sm); font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; border: 1px solid var(--border2); background: transparent; color: var(--text2); transition: all .15s; }
  .panel-btn:hover { background: var(--surface2); color: var(--text); }
  .panel-btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .panel-btn-primary:hover { opacity: .85; background: var(--accent); color: #fff; }
  .vision-item { font-size: 12px; color: var(--text2); padding: 4px 0; display: flex; gap: 8px; }
  .vision-item::before { content: '→'; color: var(--accent2); flex-shrink: 0; }
  .vision-block { margin-bottom: 16px; }
  .vision-block-title { font-size: 12px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  @media (max-width: 768px) { .sidebar { width: 60px; } .sidebar .logo-text, .sidebar .logo-sub, .nav-label, .nav-item span, .nav-count, .sidebar-footer .add-project-btn { display: none; } .main { margin-left: 60px; padding: 20px; } .metrics-grid { grid-template-columns: repeat(2,1fr); } .detail-panel { width: 100%; } }
  .chat-panel { position: fixed; bottom: 24px; right: 24px; width: 380px; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); box-shadow: 0 8px 32px rgba(0,0,0,.4); z-index: 200; display: none; flex-direction: column; max-height: 500px; }
  .chat-panel.open { display: flex; }
  .chat-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .chat-header-title { font-size: 13px; font-weight: 500; color: var(--text); }
  .chat-messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; min-height: 200px; }
  .chat-msg { max-width: 85%; padding: 8px 12px; border-radius: 10px; font-size: 13px; line-height: 1.5; }
  .chat-msg.user { background: var(--accent); color: #fff; align-self: flex-end; border-bottom-right-radius: 3px; }
  .chat-msg.ai { background: var(--surface2); color: var(--text); align-self: flex-start; border-bottom-left-radius: 3px; }
  .chat-msg.loading { color: var(--text3); font-style: italic; }
  .chat-input-row { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  .chat-input { flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; background: var(--surface2); color: var(--text); font-family: 'DM Sans', sans-serif; resize: none; }
  .chat-input:focus { outline: none; border-color: var(--accent); }
  .chat-send { padding: 8px 14px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .chat-send:hover { opacity: .85; }
  .chat-toggle { position: fixed; bottom: 24px; right: 24px; width: 48px; height: 48px; background: var(--accent); border: none; border-radius: 50%; color: #fff; font-size: 22px; cursor: pointer; z-index: 199; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(124,106,247,.4); }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-text">Hub Projets</div>
      <div class="logo-sub">v2.0 — 2026</div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Vues</div>
      <button class="nav-item active" onclick="setFilter('all',this)"><div class="nav-dot" style="background:#7c6af7"></div><span>Tous les projets</span><span class="nav-count" id="nav-all">0</span></button>
      <button class="nav-item" onclick="setFilter('active',this)"><div class="nav-dot" style="background:#3ecf8e"></div><span>En cours</span><span class="nav-count" id="nav-active">0</span></button>
      <button class="nav-item" onclick="setFilter('planning',this)"><div class="nav-dot" style="background:#f5a623"></div><span>Planification</span><span class="nav-count" id="nav-planning">0</span></button>
      <button class="nav-item" onclick="setFilter('hold',this)"><div class="nav-dot" style="background:#f26d6d"></div><span>En pause</span><span class="nav-count" id="nav-hold">0</span></button>
      <button class="nav-item" onclick="setFilter('done',this)"><div class="nav-dot" style="background:#3ecfcf"></div><span>Terminés</span><span class="nav-count" id="nav-done">0</span></button>
    </div>
    <div class="nav-section">
      <div class="nav-label">Types</div>
      <button class="nav-item" onclick="setFilter('startup',this)"><div class="nav-dot" style="background:#a598ff"></div><span>Startup</span></button>
      <button class="nav-item" onclick="setFilter('event',this)"><div class="nav-dot" style="background:#f5a083"></div><span>Événement</span></button>
      <button class="nav-item" onclick="setFilter('perso',this)"><div class="nav-dot" style="background:#e879a0"></div><span>Personnel</span></button>
      <button class="nav-item" onclick="setFilter('client',this)"><div class="nav-dot" style="background:#3ecf8e"></div><span>Client</span></button>
    </div>
    <div class="sidebar-footer">
      <button class="add-project-btn" onclick="openModal()">+ Nouveau projet</button>
    </div>
  </aside>

  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-title">Mes projets</div>
        <div class="page-date" id="current-date"></div>
      </div>
      <div class="header-actions">
        <button class="btn" onclick="exportData()">Exporter JSON</button>
        <button class="btn btn-primary" onclick="openModal()">+ Nouveau</button>
      </div>
    </div>
    <div class="metrics-grid">
      <div class="metric-card"><div class="metric-accent" style="background:#7c6af7"></div><div class="metric-label">Total projets</div><div class="metric-value" id="m-total">0</div></div>
      <div class="metric-card"><div class="metric-accent" style="background:#3ecf8e"></div><div class="metric-label">En cours</div><div class="metric-value" id="m-active">0</div></div>
      <div class="metric-card"><div class="metric-accent" style="background:#f5a623"></div><div class="metric-label">Actions à faire</div><div class="metric-value" id="m-actions">0</div></div>
      <div class="metric-card"><div class="metric-accent" style="background:#a598ff"></div><div class="metric-label">Avancement moyen</div><div class="metric-value" id="m-avg">0%</div></div>
    </div>
    <div class="filters">
      <span class="filter-label">Filtrer :</span>
      <button class="filter-pill active" onclick="setFilter('all',this)">Tous</button>
      <button class="filter-pill" onclick="setFilter('active',this)">En cours</button>
      <button class="filter-pill" onclick="setFilter('planning',this)">Planification</button>
      <button class="filter-pill" onclick="setFilter('hold',this)">En pause</button>
      <button class="filter-pill" onclick="setFilter('startup',this)">Startup</button>
      <button class="filter-pill" onclick="setFilter('event',this)">Événement</button>
      <button class="filter-pill" onclick="setFilter('perso',this)">Perso</button>
    </div>
    <div class="projects-grid" id="grid"></div>
  </main>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">Nouveau projet</div>
    <div class="form-group"><label class="form-label">Nom du projet</label><input class="form-input" id="f-title" placeholder="Ex: Mon nouveau projet"></div>
    <div class="form-group"><label class="form-label">Description</label><textarea class="form-input" id="f-desc" rows="2" placeholder="En quoi consiste ce projet ?"></textarea></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Type</label>
        <select class="form-input" id="f-type">
          <option value="startup">Startup</option><option value="event">Événement</option>
          <option value="perso">Personnel</option><option value="client">Client</option>
          <option value="agence">Agence</option><option value="autre">Autre</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Statut</label>
        <select class="form-input" id="f-status">
          <option value="planning">Planification</option><option value="active">En cours</option>
          <option value="hold">En pause</option><option value="done">Terminé</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Avancement (%)</label><input class="form-input" id="f-progress" type="number" min="0" max="100" value="0"></div>
    <div class="form-group"><label class="form-label">Échéance / Note</label><input class="form-input" id="f-date" placeholder="Ex: Q3 2026"></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">Annuler</button><button class="btn btn-primary" onclick="addProject()">Créer</button></div>
  </div>
</div>

<div class="detail-panel" id="detail-panel">
  <button class="panel-close" onclick="closePanel()">✕</button>
  <div id="panel-content"></div>
</div>

<script>
window.onerror = function(msg, src, line) {

let projects = [...DEFAULT_PROJECTS];
let currentFilter = 'all';
let nextId = 10;

function save() { try { localStorage.setItem('hub_v2', JSON.stringify(projects)); } catch(e){} }
function load() {
  try {
    const s = localStorage.getItem('hub_v2');
    if (s) projects = JSON.parse(s);
    else projects = [...DEFAULT_PROJECTS];
  } catch(e) {
    projects = [...DEFAULT_PROJECTS];
  }
}

function typeLabel(t) { return {startup:'Startup',event:'Événement',perso:'Perso',client:'Client',agence:'Agence',autre:'Autre'}[t]||t; }
function statusLabel(s) { return {active:'En cours',planning:'Planification',hold:'En pause',done:'Terminé'}[s]||s; }

function updateMetrics() {
  const total=projects.length, active=projects.filter(p=>p.status==='active').length;
  const actions=projects.reduce((a,p)=>a+(p.actions||0),0);
  const avg=total?Math.round(projects.reduce((a,p)=>a+p.progress,0)/total):0;
  document.getElementById('m-total').textContent=total;
  document.getElementById('m-active').textContent=active;
  document.getElementById('m-actions').textContent=actions;
  document.getElementById('m-avg').textContent=avg+'%';
  document.getElementById('nav-all').textContent=total;
  document.getElementById('nav-active').textContent=active;
  document.getElementById('nav-planning').textContent=projects.filter(p=>p.status==='planning').length;
  document.getElementById('nav-hold').textContent=projects.filter(p=>p.status==='hold').length;
  document.getElementById('nav-done').textContent=projects.filter(p=>p.status==='done').length;
}

function renderGrid() {
  const filtered = currentFilter==='all' ? projects : projects.filter(p=>p.status===currentFilter||p.type===currentFilter);
  const grid = document.getElementById('grid');
  if(!filtered.length){ grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text3);font-size:13px">Aucun projet dans cette catégorie.</div>`; return; }
  grid.innerHTML = filtered.map((p,i)=>{
    const color=TYPE_COLORS[p.type]||'#9997a3';
    return `<div class="project-card" style="--card-color:${color};animation-delay:${i*0.05}s" onclick="openPanel(${p.id})">
      <div class="card-header">
        <div class="card-badges">
          <span class="badge b-${p.type}">${typeLabel(p.type)}</span>
          <span class="badge s-${p.status}">${statusLabel(p.status)}</span>
        </div>
        <div class="card-menu"><button class="icon-btn" onclick="event.stopPropagation();deleteProject(${p.id})">✕</button></div>
      </div>
      <div class="card-title">${p.title}</div>
      <div class="card-desc">${p.desc}</div>
      <div class="progress-row">
        <div class="progress-bar"><div class="progress-fill" style="width:${p.progress}%"></div></div>
        <span class="progress-pct">${p.progress}%</span>
      </div>
      <div class="card-footer">
        <span class="card-meta">${p.date||''}</span>
        ${p.actions?`<span class="card-tag">${p.actions} action${p.actions>1?'s':''}</span>`:''}
      </div>
    </div>`;
  }).join('') + `<div class="add-card" onclick="openModal()"><div style="font-size:24px;opacity:.4">+</div><span>Nouveau projet</span></div>`;
  updateMetrics();
}

function setFilter(f,el) {
  currentFilter=f;
  document.querySelectorAll('.nav-item,.filter-pill').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  renderGrid();
}

function openModal() { document.getElementById('modal').classList.add('open'); setTimeout(()=>document.getElementById('f-title').focus(),100); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

function addProject() {
  const title=document.getElementById('f-title').value.trim();
  if(!title){document.getElementById('f-title').focus();return;}
  const p={id:nextId++,title,desc:document.getElementById('f-desc').value.trim()||'Projet à structurer.',type:document.getElementById('f-type').value,status:document.getElementById('f-status').value,progress:parseInt(document.getElementById('f-progress').value)||0,actions:1,date:document.getElementById('f-date').value.trim()||'Nouveau'};
  PROJECT_DATA[p.id]={phases:[],actions:[{prio:'now',label:'Maintenant',name:'Structurer ce projet avec Claude',note:'Partagez votre vision pour générer la fiche complète.'}],kpis:[],risques:[]};
  projects.unshift(p); save(); closeModal();
  document.getElementById('f-title').value=''; document.getElementById('f-desc').value=''; document.getElementById('f-progress').value='0'; document.getElementById('f-date').value='';
  currentFilter='all'; document.querySelectorAll('.nav-item,.filter-pill').forEach((b,i)=>b.classList.toggle('active',i===0));
  renderGrid();
}

function deleteProject(id) { if(!confirm('Supprimer ce projet ?'))return; projects=projects.filter(p=>p.id!==id); save(); closePanel(); renderGrid(); }

function openPanel(id) {

  const data=PROJECT_DATA[id]||{phases:[],actions:[],kpis:[],risques:[]};

      <div style="width:40px;height:40px;border-radius:10px;background:${color}22;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:500;color:${color};flex-shrink:0">${p.title.charAt(0)}</div>
      <div><div style="font-size:16px;font-weight:500;letter-spacing:-.02em">${p.title}</div><div style="font-size:12px;color:var(--text3);margin-top:2px">${p.desc}</div></div>

      <span class="badge s-${p.status}">${statusLabel(p.status)}</span>
    </div>
    <div style="margin:12px 0">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px">
        <span style="font-size:11px;color:var(--text3)">Avancement</span>
        <span style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace">${p.progress}%</span>
      </div>
      <div class="progress-bar" style="height:4px"><div class="progress-fill" style="width:${p.progress}%;background:${color}"></div></div>
    </div>
    ${p.sheet?`<div style="margin-bottom:12px"><a href="${p.sheet}" target="_blank" style="font-size:12px;color:var(--accent2);text-decoration:none;display:flex;align-items:center;gap:5px"><span style="font-size:14px">📊</span> Google Sheet commandes ↗</a></div>`:''}

    <div class="panel-tabs">
      ${data.vision?'<button class="panel-tab active" onclick="switchTab(\'vision\',this)">Vision</button>':''}
      <button class="panel-tab ${!data.vision?'active':''}" onclick="switchTab('roadmap',this)">Roadmap</button>
      <button class="panel-tab" onclick="switchTab('actions',this)">Actions</button>
      <button class="panel-tab" onclick="switchTab('kpis',this)">KPIs</button>
      <button class="panel-tab" onclick="switchTab('risques',this)">Risques</button>
      <button class="panel-tab" onclick="switchTab('claude',this)">✦ Claude</button>
    </div>`;

  if(data.vision) {
    html+=`<div id="tab-vision" class="panel-section active">
      <div class="vision-block"><div class="vision-block-title">Court terme — 2026</div>${data.vision.court.map(v=>`<div class="vision-item">${v}</div>`).join('')}</div>
      <div class="vision-block"><div class="vision-block-title">Long terme — 2027-2028</div>${data.vision.long.map(v=>`<div class="vision-item">${v}</div>`).join('')}</div>
    </div>`;
  }

  html+=`<div id="tab-roadmap" class="panel-section ${!data.vision?'active':''}">`;
  if(isEmpty){ html+=`<div class="empty-panel">Fiche non encore générée.<br>Cliquez sur le bouton ci-dessous pour que Claude structure ce projet.</div>`; }
  else { data.phases.forEach(ph=>{ html+=`<div class="phase-item"><div class="phase-hrow"><div class="phase-dot" style="background:${ph.color}"></div><div class="phase-name">${ph.name}</div><div class="phase-weeks">${ph.weeks}</div></div><div class="phase-tasks">${ph.tasks.map(t=>`<div class="phase-task">${t}</div>`).join('')}</div></div>`; }); }
  html+=`</div>`;

  html+=`<div id="tab-actions" class="panel-section">`;
  if(data.actions&&data.actions.length){ data.actions.forEach(a=>{ html+=`<div class="action-item"><span class="prio-tag p-${a.prio}">${a.label}</span><div><div class="action-name">${a.name}</div><div class="action-note">${a.note}</div></div></div>`; }); }
  html+=`</div>`;

  html+=`<div id="tab-kpis" class="panel-section">`;
  if(data.kpis&&data.kpis.length){ data.kpis.forEach(k=>{ html+=`<div class="kpi-item"><div class="kpi-name-t">${k.name}</div><div class="kpi-val">${k.val}</div></div>`; }); }
  else { html+=`<div class="empty-panel">KPIs à définir avec Claude.</div>`; }
  html+=`</div>`;

  html+=`<div id="tab-risques" class="panel-section">`;
  if(data.risques&&data.risques.length){ data.risques.forEach(r=>{ html+=`<div class="risk-item"><div class="risk-hrow"><span class="rlevel r-${r.level}">${{high:'Critique',med:'Moyen',low:'Faible'}[r.level]}</span><div class="risk-title">${r.title}</div></div><div class="risk-mit">${r.mit}</div></div>`; }); }
  else { html+=`<div class="empty-panel">Risques à analyser avec Claude.</div>`; }
  html+=`</div>`;

  html+=`<div id="tab-claude" class="panel-section">
    <div id="chat-messages-${p.id}" style="min-height:80px;max-height:300px;overflow-y:auto;margin-bottom:12px;display:flex;flex-direction:column;gap:10px"></div>
    <div style="display:flex;gap:8px;align-items:flex-end">
      <textarea id="chat-input-${p.id}" class="form-input" rows="2" placeholder="Demande quelque chose sur ce projet..." style="resize:none;flex:1"></textarea>
      <button class="btn btn-primary" onclick="askClaude(${p.id})" style="flex-shrink:0;height:58px;padding:0 16px">Envoyer</button>
    </div>
  </div>`;

  html+=`<div class="panel-cta">
    <button class="panel-btn panel-btn-primary" onclick="copyToClaudeCode(${p.id})">Copier contexte pour Claude Code ↗</button>
  </div>`;

  document.getElementById('panel-content').innerHTML=html;
  document.getElementById('detail-panel').classList.add('open');
}

function closePanel() { document.getElementById('detail-panel').classList.remove('open'); }
function switchTab(id,el) {
  document.querySelectorAll('.panel-section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.panel-tab').forEach(t=>t.classList.remove('active'));
  const s=document.getElementById('tab-'+id); if(s) s.classList.add('active');
  el.classList.add('active');
}

function exportData() {
  const blob=new Blob([JSON.stringify(projects,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='hub-projets.json'; a.click();
}

document.getElementById('current-date').textContent=new Date().toLocaleDateString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
const chatHistories = {};

async function askClaude(id) {
  const input = document.getElementById('chat-input-' + id);
  const box = document.getElementById('chat-messages-' + id);
  const text = input.value.trim();
  if (!text) return;

  if (!chatHistories[id]) chatHistories[id] = [];
  chatHistories[id].push({ role: 'user', content: text });

  box.innerHTML += `<div style="background:var(--surface3);padding:8px 12px;border-radius:8px;font-size:12px;color:var(--text);align-self:flex-end;max-width:85%">${text}</div>`;
  input.value = '';
  box.innerHTML += `<div id="typing-${id}" style="font-size:12px;color:var(--text3);padding:4px 0">Claude réfléchit...</div>`;
  box.scrollTop = box.scrollHeight;

  const p = projects.find(x => x.id === id);
  const data = PROJECT_DATA[id] || {};
  const projectContext = `Projet: ${p.title} | Type: ${p.type} | Statut: ${p.status} | Avancement: ${p.progress}% | Description: ${p.desc}`;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: chatHistories[id], projectContext })
    });
    const result = await res.json();
    const reply = result.content?.[0]?.text || result.error || 'Pas de réponse.';
    chatHistories[id].push({ role: 'assistant', content: reply });

    document.getElementById('typing-' + id)?.remove();
    box.innerHTML += `<div style="background:rgba(124,106,247,.1);border:1px solid rgba(124,106,247,.2);padding:8px 12px;border-radius:8px;font-size:12px;color:var(--text);align-self:flex-start;max-width:95%;white-space:pre-wrap">${reply}</div>`;
    box.scrollTop = box.scrollHeight;
  } catch(e) {
    document.getElementById('typing-' + id)?.remove();
    box.innerHTML += `<div style="font-size:12px;color:var(--red);padding:4px 0">Erreur de connexion à l\'API.</div>`;
  }
}

function copyToClaudeCode(id) {
  const p = projects.find(x => x.id === id);
  const data = PROJECT_DATA[id] || {};
  const ctx = [
    'Projet : ' + p.title,
    'Type : ' + p.type + ' | Statut : ' + p.status + ' | Avancement : ' + p.progress + '%',
    'Description : ' + p.desc,
    'Échéance : ' + (p.date || 'non définie'),
    data.phases && data.phases.length ? 'Phases : ' + data.phases.map(ph => ph.name + ' (' + ph.weeks + ')').join(', ') : '',
    data.actions && data.actions.length ? 'Actions prioritaires : ' + data.actions.map(a => '[' + a.label + '] ' + a.name).join(' | ') : '',
    data.kpis && data.kpis.length ? 'KPIs : ' + data.kpis.map(k => k.name + ' → ' + k.val).join(', ') : '',
    '',
    'Je veux que tu m\'aides à mettre à jour ce projet dans index.html.'
  ].filter(Boolean).join('\n');
  navigator.clipboard.writeText(ctx).then(() => {
    const btn = event.target;
    btn.textContent = '✓ Copié — colle dans Claude Code';
    btn.style.background = '#3ecf8e';
    setTimeout(() => { btn.textContent = 'Copier contexte pour Claude Code ↗'; btn.style.background = ''; }, 3000);
  });
}

let currentProjectId = null;
let chatHistory = [];

function toggleChat() {
  const panel = document.getElementById('chat-panel');
  const toggle = document.getElementById('chat-toggle');
  panel.classList.toggle('open');
  toggle.style.display = panel.classList.contains('open') ? 'none' : 'flex';
  if (panel.classList.contains('open') && chatHistory.length === 0) {
    addMessage('ai', 'Bonjour ! Sélectionne un projet et je t\'aide à le structurer, mettre à jour ou analyser. 🚀');
  }
}

function addMessage(role, text) {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'chat-msg ' + role;
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMessage('user', text);
  chatHistory.push({ role: 'user', content: text });
  const loading = addMessage('ai', 'En train de réfléchir...');
  loading.classList.add('loading');
  const p = currentProjectId ? projects.find(x => x.id === currentProjectId) : null;
  const context = p ? 'Projet : ' + p.title + ' | Statut : ' + p.status + ' | Avancement : ' + p.progress + '% | Description : ' + p.desc : 'Aucun projet sélectionné.';
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: chatHistory, projectContext: context })
    });
    const data = await res.json();
    const reply = data.content[0].text;
    loading.remove();
    addMessage('ai', reply);
    chatHistory.push({ role: 'assistant', content: reply });
  } catch(e) {
    loading.textContent = 'Erreur — réessaie dans un instant.';
    loading.classList.remove('loading');
  }
}

const chatInputEl = document.getElementById('chat-input');
if (chatInputEl) {
  chatInputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
  });
}

load(); renderGrid();
</script>

<button class="chat-toggle" id="chat-toggle" onclick="toggleChat()">✦</button>
<div class="chat-panel" id="chat-panel">
  <div class="chat-header">
    <div class="chat-header-title" id="chat-title">Assistant IA</div>
    <button class="icon-btn" onclick="toggleChat()">✕</button>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-row">
    <textarea class="chat-input" id="chat-input" rows="1" placeholder="Pose une question sur ce projet..."></textarea>
    <button class="chat-send" onclick="sendChat()">→</button>
  </div>
</div>
</body>
</html>
